- name: instagram
  description: Find Instagram profiles
  creator: CayberMods
  color: '#E4405F'
  regex:
    - 'instagram\.com\/([a-zA-Z0-9_\.]+)'
    - 'instagr\.am\/([a-zA-Z0-9_\.]+)'

